<main class="auth-page">
  <div class="absolute right-3 top-3 z-20 sm:right-4 sm:top-4">
    <app-language-switcher></app-language-switcher>
  </div>
  <div class="blob-top"></div>
  <div class="blob-bottom"></div>

  <section class="auth-card" aria-label="Verify OTP and reset password form">
    <p class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-sky-200/95">{{ 'reset.eyebrow' | t }}</p>
    <h1 class="text-4xl font-bold leading-tight sm:text-5xl">{{ 'verify.title' | t }}</h1>
    <p class="mb-5 mt-2 text-sky-200/85">{{ 'verify.subtitle' | t }}</p>

    <form class="grid gap-3">
      <label for="otp" class="text-sm font-semibold">{{ 'verify.otp' | t }}</label>
      <input id="otp" type="text" placeholder="{{ 'verify.otpPlaceholder' | t }}" class="w-full rounded-xl border border-black bg-slate-900/75 px-3.5 py-3 text-sky-100 outline-none transition placeholder:text-sky-200/70 focus:border-sky-300 focus:bg-slate-900/95" />

      <label for="newPassword" class="text-sm font-semibold">{{ 'verify.newPassword' | t }}</label>
      <input
        id="newPassword"
        type="password"
        placeholder="{{ 'verify.newPasswordPlaceholder' | t }}"
        (input)="onNewPasswordInput($event)"
        class="w-full rounded-xl border border-black bg-slate-900/75 px-3.5 py-3 text-sky-100 outline-none transition placeholder:text-sky-200/70 focus:border-sky-300 focus:bg-slate-900/95"
      />
      <small class="-mt-1 text-xs text-sky-500" *ngIf="showNewPasswordError">{{ 'register.passwordMin' | t }}</small>

      <label for="confirmPassword" class="text-sm font-semibold">{{ 'verify.confirmPassword' | t }}</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="{{ 'verify.confirmPasswordPlaceholder' | t }}"
        (input)="onConfirmPasswordInput($event)"
        class="w-full rounded-xl border border-black bg-slate-900/75 px-3.5 py-3 text-sky-100 outline-none transition placeholder:text-sky-200/70 focus:border-sky-300 focus:bg-slate-900/95"
      />
      <small class="-mt-1 text-xs text-sky-500" *ngIf="showConfirmPasswordError">{{ 'register.passwordMin' | t }}</small>

      <button
        type="button"
        routerLink="/login"
        [disabled]="showNewPasswordError || showConfirmPasswordError || !newPassword || !confirmPassword"
        class="btn-primary"
      >
        {{ 'verify.updatePassword' | t }}
      </button>
    </form>

    <p class="mt-4 text-sm text-sky-200/85">
      {{ 'reset.backTo' | t }}
      <a routerLink="/login" class="font-bold text-sky-200 hover:underline">{{ 'common.login' | t }}</a>
    </p>
  </section>
</main>
